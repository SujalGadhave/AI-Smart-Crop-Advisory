services:
  - type: web
    name: krushimitra-ai
    runtime: docker
    plan: free
    region: oregon
    dockerContext: ./ai-service
    dockerfilePath: ./ai-service/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit

  - type: web
    name: krushimitra-backend
    runtime: docker
    plan: free
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krushimitra-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: krushimitra-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: krushimitra-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: AI_SERVICE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false

  - type: web
    name: krushimitra-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: krushimitra-db
    plan: free
    region: oregon
    databaseName: krushi
    user: krishi