spring.application.name=krishimitra-backend
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/krushi?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Kolkata}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sujal@123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false
spring.jpa.open-in-view=false

logging.level.org.springframework.security=INFO

# Notification providers are disabled by default to preserve existing mock behavior.
notifications.providers.sms.enabled=false
notifications.providers.sms.webhook-url=
notifications.providers.sms.auth-token=
notifications.providers.sms.callback-token=
notifications.providers.sms.max-attempts=3
notifications.providers.sms.initial-backoff-ms=200

notifications.providers.whatsapp.enabled=false
notifications.providers.whatsapp.webhook-url=
notifications.providers.whatsapp.auth-token=
notifications.providers.whatsapp.callback-token=
notifications.providers.whatsapp.max-attempts=3
notifications.providers.whatsapp.initial-backoff-ms=200

notifications.providers.push.enabled=false
notifications.providers.push.webhook-url=
notifications.providers.push.auth-token=
notifications.providers.push.callback-token=
notifications.providers.push.max-attempts=3
notifications.providers.push.initial-backoff-ms=200
